<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<!--/*/<th:block th:replace="~{layout.html :: documentHead('Form Elements Demo')}"/>/*/-->
<body class="bg-gray-900 text-green-400 min-h-screen flex flex-col">
<!--/*/<th:block th:replace="~{layout.html :: header}"/>/*/-->

<!-- Main Content -->
<main class="container mx-auto p-4 flex-grow">
  <div class="bg-gray-800 p-6 rounded-lg border border-green-900">
    <h2 class="text-lg sm:text-xl mb-4 terminal-glow">> Form Elements Demo</h2>

    <form th:action="@{/form-elements}" th:object="${formElements}" method="post">
      <!-- Text -->
      <div class="mb-4">
        <label class="block text-sm mb-2" for="text">
          <span class="text-green-600">$</span> text
        </label>
        <input type="text"
               id="text"
               th:field="*{text}"
               class="w-full bg-gray-900 border border-green-900 rounded px-3 py-2 text-green-400 focus:outline-none focus:border-green-600"
               placeholder="Enter text...">
      </div>

      <!-- Password -->
      <div class="mb-4">
        <label class="block text-sm mb-2" for="password">
          <span class="text-green-600">$</span> password
        </label>
        <input type="password"
               id="password"
               th:field="*{password}"
               class="w-full bg-gray-900 border border-green-900 rounded px-3 py-2 text-green-400 focus:outline-none focus:border-green-600"
               placeholder="Enter password...">
      </div>

      <!-- Email -->
      <div class="mb-4">
        <label class="block text-sm mb-2" for="email">
          <span class="text-green-600">$</span> email
        </label>
        <input type="email"
               id="email"
               th:field="*{email}"
               class="w-full bg-gray-900 border border-green-900 rounded px-3 py-2 text-green-400 focus:outline-none focus:border-green-600"
               placeholder="Enter email...">
      </div>

      <!-- Number -->
      <div class="mb-4">
        <label class="block text-sm mb-2" for="number">
          <span class="text-green-600">$</span> number
        </label>
        <input type="number"
               id="number"
               th:field="*{number}"
               class="w-full bg-gray-900 border border-green-900 rounded px-3 py-2 text-green-400 focus:outline-none focus:border-green-600"
               placeholder="Enter number...">
      </div>

      <!-- Date -->
      <div class="mb-4">
        <label class="block text-sm mb-2" for="date">
          <span class="text-green-600">$</span> date
        </label>
        <input type="date"
               id="date"
               th:field="*{date}"
               class="w-full bg-gray-900 border border-green-900 rounded px-3 py-2 text-green-400 focus:outline-none focus:border-green-600">
      </div>

      <!-- Time -->
      <div class="mb-4">
        <label class="block text-sm mb-2" for="time">
          <span class="text-green-600">$</span> time
        </label>
        <input type="time"
               id="time"
               th:field="*{time}"
               class="w-full bg-gray-900 border border-green-900 rounded px-3 py-2 text-green-400 focus:outline-none focus:border-green-600">
      </div>

      <!-- Datetime-local -->
      <div class="mb-4">
        <label class="block text-sm mb-2" for="datetimeLocal">
          <span class="text-green-600">$</span> datetime-local
        </label>
        <input type="datetime-local"
               id="datetimeLocal"
               th:field="*{datetimeLocal}"
               class="w-full bg-gray-900 border border-green-900 rounded px-3 py-2 text-green-400 focus:outline-none focus:border-green-600">
      </div>

      <!-- Color -->
      <div class="mb-4">
        <label class="block text-sm mb-2" for="color">
          <span class="text-green-600">$</span> color
        </label>
        <input type="color"
               id="color"
               th:field="*{color}"
               class="w-full bg-gray-900 border border-green-900 p-1 text-green-400 focus:outline-none focus:border-green-600">
      </div>

      <!-- Checkbox (Switch) -->
      <div class="mb-4">
        <label class="block text-sm mb-2" for="checkbox">
          <span class="text-green-600">$</span> checkbox (switch)
        </label>
        <div class="switch-wrapper">
          <input type="checkbox"
                 id="checkbox"
                 name="checkbox"
                 th:checked="${formElements.checkbox}"
                 th:value="${formElements.checkbox}">
          <span class="switch-slider"></span>
        </div>
      </div>

      <!-- Radio -->
      <div class="mb-4">
        <label class="block text-sm mb-2">
          <span class="text-green-600">$</span> radio
        </label>
        <div class="space-y-2">
          <label th:each="option : ${radioOptions}" class="flex items-center">
            <input type="radio"
                   th:field="*{radio}"
                   th:value="${option}"
                   class="bg-gray-900 border border-green-900 text-green-600 focus:outline-none focus:ring-0 mr-2">
            <span th:text="${option}"></span>
          </label>
        </div>
      </div>

      <!-- Select Single -->
      <div class="mb-4">
        <label class="block text-sm mb-2" for="selectSingle">
          <span class="text-green-600">$</span> select (single)
        </label>
        <select id="selectSingle"
                th:field="*{selectSingle}"
                class="w-full bg-gray-900 border border-green-900 rounded px-3 py-2 text-green-400 focus:outline-none focus:border-green-600">
          <option value="">Select an option...</option>
          <option th:each="option : ${selectOptions}"
                  th:value="${option}"
                  th:text="${option}"></option>
        </select>
      </div>

      <!-- Select Multiple -->
      <div class="mb-4">
        <label class="block text-sm mb-2" for="selectMultiple">
          <span class="text-green-600">$</span> select (multiple)
        </label>
        <select id="selectMultiple"
                th:field="*{selectMultiple}"
                multiple="multiple"
                size="3"
                class="w-full bg-gray-900 border border-green-900 rounded scrollable-no-radius-right px-3 py-2 text-green-400 focus:outline-none focus:border-green-600">
          <option th:each="option : ${selectOptions}"
                  th:value="${option}"
                  th:text="${option}"></option>
        </select>
        <p class="text-xs text-green-600 mt-1">[Hold Ctrl/Cmd to select multiple]</p>
      </div>

      <!-- Textarea -->
      <div class="mb-4">
        <label class="block text-sm mb-2" for="textarea">
          <span class="text-green-600">$</span> textarea
        </label>
        <textarea id="textarea"
                  th:field="*{textarea}"
                  rows="4"
                  class="w-full bg-gray-900 border border-green-900 rounded px-3 py-2 text-green-400 focus:outline-none focus:border-green-600"
                  placeholder="Enter text..."></textarea>
      </div>

      <!-- File -->
      <div class="mb-4">
        <label class="block text-sm mb-2" for="file">
          <span class="text-green-600">$</span> file
        </label>
        <input type="file"
               id="file"
               name="file"
               class="w-full bg-gray-900 border border-green-900 rounded px-3 py-2 text-green-400 focus:outline-none focus:border-green-600">
      </div>

      <!-- Submit -->
      <div class="flex justify-between items-center">
        <button type="submit"
                class="bg-green-900 hover:bg-green-800 text-green-400 px-4 py-2 rounded border border-green-600 transition-colors">
          > Submit
        </button>
        <a href="/" class="bg-gray-800 hover:bg-gray-700 text-green-400 px-4 py-2 rounded border border-green-900 transition-colors inline-block">$ Cancel</a>
      </div>
    </form>
  </div>
</main>

<!--/*/<th:block th:replace="~{layout.html :: footer}"/>/*/-->
<!--/*/<th:block th:replace="~{layout.html :: script}"/>/*/-->
</body>
</html>
